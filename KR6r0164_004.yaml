body:
  text: 黃州飛火亂焚獨免齊戶癸卯余度夏安國七月望日黃州城內外回祿錯綜亂燒不捱街巷廛戶黃岡縣庭一槐墜火燒去其半赤壁江心一船亦飛火被燒獨齊公數十家如楊雲峰任季先等皆火逼險極竟安無損甚至有齊公住茅房在火心者亦跳越過不貧女捨一錢鑄佛勝跡不磨蘇州北寺鑄彌勒銅像爐方熾一貧女適解少小所佩一錢投之蓋花欄隆慶也像成錢現于腹之正中銼去復現罷翁曰此雖一錢難于富者千萬割所甚愛也華嚴知識婆須密女亦施一寶錢供高行佛竟登妙果嗚呼苟發大願回向求佛孰謂一錢少哉堯峰僧竊韋天燈油立招譴責順治丁亥年堯峰一行僧夜竊韋䭾前燈油口出吳俗俚語云莫管他娘次日僧忽自反縛跪韋天前呵云汝前日在玄墓偷喫一盤我姑宥汝今又竊我燈油且口出惡語罪死不赦合院僧驚懼代禮跪陳懺悔乃曰若非關聖垂慈解勸立杵死罰跪安香一炷香將完衆扶腋上禪單又呵曰尚有香二寸在灰內依舊反縛跪床上衆揀灰內香果二寸香畢乃放縛罷翁曰此安禪菴虗白老師親見為余說毗盧塔鬼勾僧索債酬畢方蘇余丁未二月將下四祖赴靈隱忽一僧伴四人遊毗盧塔驀見中懸一人急解下乃常住火頭也問何故自縊乃曰見三鬼押我父索債繫我于梁也問何債曰我父吉安人名淦十八為糧長先收此三人銀三百金別用去復遺害此三人故來索債也言訖仍震掉發顛余為領衆灑淨誦呪復放斛食備衆房數大紙錠焚焉僧見鬼拍掌領去遂立醒罷翁曰父債子還自是正理然為僧亦不得脫債不可負人如此二孝廉侮慢文昌身祿俱損福州孝廉林逸王元升纍上春官不第心甚憤憤一日醉往梓潼廟見帝君像指而嫚罵曰今不作汝矣何為復在此受饗祀乎因上神座盡力推像踣趺粉碎二人回家大發熱帝君附體痛罵曰汝二狂生前世止作幾小福上帝報汝以孝廉且家資不薄已過分矣何為狂妄放肆毀壞吾像惡至此極乎立付地府鞫治家人驚悸連夕塑起聖像卒不救而死罷翁曰丙午余在閩親聞此事後詢福州衲子衆口一辭確實不誣二孝廉襲慢地藏立死受報麻城二孝廉一信佛一慢佛同讀書地藏殿忽一親戚饋狗肉至信者摩令去曰莫兒戲慢者曰大人不見小過信者倉皇避至門外慢者反上佛座欲夾肉戲獻菩薩才舉箸空中忽一推塌地倒仆立死少頃門外孝廉亦死同至冥府見慢者拷掠笞榜百刑皆受以頸階枷枷上火起遍體燒爛冥君向信者曰汝信心不應來令汝來者證知彼受苦傳示人世耳敕令回陽遂蘇罷翁曰杏巖支浮和尚及廓門石堂親述從來慢神佛者皆遭險報世人不悟往往以神佛為荒唐輒加侮慢自貽伊戚悔之晚矣建昌小民穢汙三寶雷神擊死建昌府南門外一小民姓王素行不孝乙巳七月某日買牛肉就淨土寺僧鍋烹煮王人為小兒手刮絲瓜小兒忽見一緋衣婦人項負一大鏡入戶以手指王人王人即跪下旋見一雷神以椎擊之大火一噴隨出外發聲王人身面俱黑立死背有字一行人不能識罷翁曰余是秋適在建昌景雲寺去淨土寺不一箭余侍者無不往觀城內外皆知食牛為罪余乘機為嚴玉環提臺言之立禁宰牛甬城人以穢觸塔廟立遭奇禍天峰塔在寧波城中某年九月數俗子携酒肉歡呼其上一人即於塔戶溲溺時秋空正朗忽霹𮦷擊其人墮塔死杯盤壺斝星飛餘人盡擲之塔下塔隨回祿今復修整又四明尊者法智大師塔在延慶寺衆舉子較藝寺中一生就塔遺溺旁有駭者曰塔靈不可穢生曰僧去數百年遺骨既朽何靈之有溺竟突發狂悸引刀自殺同伴掖之登舟復沒水死罷翁曰錢希聲州侯昆仲述陳祥屠狗怙惡不慘現身招報余州中門人錢登九一僕名陳祥日入內充役暗地屠狗余朝夕苦口切勸卒不改業一日食新河豚毒發痛悶欲死醫人勸食糞漿可救陳祥蛇行至廁邊大啖糞卒不治作狗聲哀呌而死熊季納以精虔護法刻期獲嗣南康下建昌熊士龍字季納給諫青嶼公諱德陽季子也世護雲居祖席會嶼翁欲請顓愚大師住雲居命子料理季納以身任常住精誠備至為辨什物費五百緡適家中懷妊顓師曰公如此護法佛祖定與男嗣季納立約曰若因護法顯靈須是臘八日生子初七初九皆不算也子向玉果臘八生不爽毫髮罷翁曰余住雲居十載季納又始終護法余遷黃梅四祖三載公方捐館赤心為法門萬中難得矣惜哉顧秀才化鶴回生尋訪得實崇禎丙子科無錫顧秀才因鄉試寓長干報恩寺僧舍偶晝𥨊忽夢作白鶴飛翔空中心甚快樂飛至雨花臺畔見一人家堂房嚴麗扁對精雅一一悉記飛入內殿見數女人擁一婦分娩鶴忽眼花遂墮盆中合家稱慶鶴驚念曰吾本來鄉試若為人後吾必死矣乃絶呌而醒則僮僕圍哭久矣次日秀才録扁對命僕尋訪一一儼在乃中年無子一富翁也翁聞悲愴到寺識認厚饋秀才曰因老身薄福招不起相公耳痛哭而去罷翁曰余亦在南中預試見聞歎詫黃封翁以行善感大士送子著大名節嘉定黃韞生父中年艱于得子力行善事勤誦白衣經忽夢大士抱一孩兒送曰念汝勤苦誦經行善尋得一絶好秀才與汝須善養之初名金耀為名士次改淳耀中癸未進士乙酉感憤世變乃與弟偉公同縊于北門外佛殿中罷翁曰昔余於試地頻頻見韞生真金玉君子後成名進士而大士只曰好秀才古曰秀才價以天下為己任如韞生者才品高出節忠凜然真好秀才也吳霞舟以盡節焚身神升天吳鍾巒字巒稚號霞舟毗陵人素為名宿六十餘成進士初任長興令纍遷至粵西司臬申酉間因經國變遁至周山輒自念曰吾門人李仲達同窗馬素修皆死節今年垂八十倘一旦病歿不幾負二人乎吾當尋一死所明白乾淨以見知己時公在周山城內寓文廟中先聚薪為龕中設高座聞城陷即抱聖牌登龕坐命僕縱火頃刻而盡未幾降乩于毗陵張淡如家言焚身後神明上升為玉霄宮青衣使者作詩數在世有八十焚身總為君念及至今猶涕淚之句罷翁曰余丙午八月從曹溪回至䖍州與公季子公及同寓東溪寺備見紀實刻木史封翁以久遠齊僧感子大魁狀元史大成號立菴前生為寧波某寺僧號大成為寺收盞飯接衆飯桶若淺必至史家取滿回寺以此為常不記年載史封翁素積德蓄一巨碗盛飯供佛後用作盞飯已五世矣一日忽見大成僧入戶索之無跡遂誕立菴即名大成持胎齊雖中大魁戒行如故前生一僧為道友尚相携作伴罷翁曰往余在洪都石亭寺見公詩云長齊不苦食無魚入胎隔陰真性不迷道骨禪心異熟如舊真驗在目前也楊君以錯口救人致家溫富蘇州石湖民姓楊初以赤貧為穿窬知一老媼薄有所蓄黑夜穿牆入房見媼燈下操紡乃匿床後伺之忽見一青面鬼數以圈套其頂媼即停紡歎曰何苦為人不如弔死遂起身尋繩穿梁作圈登機子上弔鬼推倒機子以雙手掣墜其足盜狂駭忘己是盜大聲高呌曰速救人媼有三子齊排闥入倉忙解救母得不死叩首謝盜曰恩人恩人然如此黑夜君何自來乎盜聞言猛醒曰阿呀阿呀我實是反人也因貧極為小盜希圖活命適見青面鬼害汝令堂不覺絶呌乞赦我罪放我去足矣三子曰汝救我母命是大恩人必圖報恩乃留宿欵待天明以十金贈之勸做好人盜感悟改行以金作本經理貿易致家千金石湖稱小殷戶焉罷翁曰此明末年事也石湖僧俗屢述甚悉吳生遇仙愛命蹉過奇緣金閶吳生篤信呂祖日往神仙廟禮拜冀得一見戊午四月十三夕夢神告曰明日祖誕冠紫陽巾披藍道服者呂祖也子勿蹉過吳生早往候果然乃叩首懇苦求度祖初堅拒最後引至城頭令閉目左手張傘右手持祖衣袖立即騰空少頃間濤聲洶湧張目偷視似在大海面浮空飛渡呂祖曰汝果欲求仙乎可跳入水生猶豫祖曰原來是俗骨驀頸一椎而墮乃在洞庭湖灘上生乞丐三月方達吳門罷翁曰求仙求佛皆用第一念為之稍一躊躇必然退縮二祖立雪斷臂靜靄法師因唐武滅教抉腸挂樹稍落第二念能為此乎吳生求仙遇而不遇非第二念為害哉友生孟和居士親見而說瞽者以害心劫殺己命立殞饒州鄱陽縣路口一井亭旁有一荒墳庚子六月一商進亭飲水見一算命瞽者與引路童子在內遂令一推算算訖商開挂箱取銀相酬連解幾包並無碎者乃取一指頂大者酬之商去不數十步瞽問童子曰吾一生算命從未得此塊大銀此人箱中有多少銀耶童子曰連開幾包皆整錠其銀正多耳瞽遂絶呌商人云來來吾揣骨相如神更為汝一相商返至亭瞽者即為遍身揣摸嘖嘖贊美漸揣至㗋頸驀以雙手緊摵抵死不放商立刻氣絶乃與童子拖擲荒墳叢中而正欲攫挂箱去忽軍兵一隊亦下馬入亭飲水一兵見草路有痕疾往一探見一死尸通身火熱高呌云此荒僻處更無別人必瞽者二人謀死乃刀迫脅童子曰汝為甚謀財害命乎童子驚悸指瞽者曰是他所害非我也衆兵遂亂砍瞽人立剁作肉泥取箱去押童子到府亦仆死罷翁曰算命非殺人之術瞽者本無殺人之心一聞多金殺機遂動殺機一動遂即滅身可知人生世間生于善死于惡生與死存乎機周子曰誠無為機善惡機之可畏一至於此可不慎哉余法嗣九屏鵬子住鄱湖親見來雲居說吳道媼以虔誦金剛坐化顯異媼吳氏濟寧人隨夫唐某至松江初性極剛暴獨好佛年四十三歸依冰鎧禪師遂持長齊晝夜持誦金剛經不出小樓者六載至四十九忽告人曰吾某日去矣經云金剛不壞身吾去後可留身三年若果不壞經方靈驗遂說偈曰風捲雲霧散明月碧團圓了然無礙池內現金蓮遂命削髮趺坐而逝越三年啓龕果不壞頂髮長半寸提督梁公遂為漆身建菴供奉額曰坐化今在府學宮側晦叟親見為作詩表之詩曰猛誦金經止六春心如鐵石遂成真王公難買純剛骨共室遍留不壞身端坐歸西徵定力臨行說偈度迷津龕中頂髮驚重長愧殺鬚眉醉夢人方氏以虔誠禮誦盡室生還桐城方氏以事獲譴至寧固塔闔門虔懇歸命佛天朝則持準提誦金剛暮則禮斗姆祈保生還一夕禮斗次燈已黑禮拜起燈忽自明又一深夜室中忽發異香主者急呼闔眷皆跪祝曰此俱望生還者若得滿願再求賜香言訖異香復發三祝之三應旋蒙恩釋果得生還罷翁曰余與方與三兄素稱莫逆癸卯在黃州口述今辛亥復唔湖上屬余書事編入一門精誠感應至此鑿鑿不誣許子位以前生撿字得中高科余友許自俊字子位嘉定籍癸卯同在黃州謂余曰弟前生乃天界寺撿字紙僧也余問何據許曰闈中夢身是僧號房前置一筐籃一竹夾傍見回邑友吳靖光字順禎亦僧服前懸一腐袋自言前生在某寺打腐供衆也取其卷揭開內有字二行云吳某缺許某米一石三斗銀一千兩登賢書後二事皆驗子位庚戌榜中會魁第六罷翁曰其公苦行供衆報得富貴子位尊重聖教家雖貧才名冠世老中巍科造物報施不爽如此宋王公一生撿字紙以香湯洗沐焚瘞其灰生子王曾中三元見之文昌敬字紙文無論僧俗依此行持的不虧人也董七以虗稱取利家財暗耗餘杭縣玉霄宮一道士每日對龍潭誦度人經忽一龍神現身曰老師誦經極妙只弟子一家坐立不安請至殿上誦吾當為日供乳二斤自後供養者十載忽數日不供道士依舊對潭誦經龍神復現道士問何以近日不供乳龍神曰此乳原非吾宮中所有因部民董七以十四兩稱賣乳吾得抽其羡餘供養老師數日前董七已死今其父管店用十六兩准稱吾不能復抽故不來供非敢失信也道士大感歎罷翁曰今市廛中人皆知大稱小斗曲心取利自謂得計至暗中被骨神消耗則無人知也此明末事出餘杭邑志附録醒世費隱老和尚逝後茶毗現多舍利費隱和尚法嗣天童密老人歷主金粟天童徑山諸大剎嚴行正令號海內大宗匠晚住石門福嚴蒞衆勤苦精嚴禪誦後臨遷化囑纍細大等事皆從脫灑囑付畢端然坐逝茶毗頂骨牙齒不壞通身舍利纍纍幾至千顆巨者竟如大菽有後來者至火場哀懇續得者無算建塔閩之黃檗山及金粟興陽諸處罷翁曰余在漢口獨冠和尚處見十四顆後到南安獅絃和尚處復見十五顆又在南雄李砍刀道人家見六顆以水浮之皆行水面合為一處蓋皆師道力堅確知致也曹溪原直禪師以悟道精修末後現瑞原直和尚諱全賦法嗣靈巖繼老人出世楚之九峰繼遷華林華藥南嶽福嚴後住曹溪一載復至粵西行化歸住德山臨遷化命以水一盂刀一柄以刀投水中端然坐逝荼毗火光上現金身佛像道俗翕然稱為周金剛再來也罷翁曰原直兄雖主宗門旦暮勤苦持誦日中一食蓋余弟兄中最有行業者率之臨行超卓火中現像孰謂修行無靈驗哉天白大德以持誦法華終聞天樂天白諱性純從雲居稟戒後過午不食晝夜行持居燕坊福城菴每日師徒伺候行腳僧接歸如法供養次背誦法華每日一部雖行路不廢如是者數載後臨遷化一家及客僧俱聞天樂鳴空徒心鏡進白師曰吾一生真實修行不可傳此反成虗妄端坐而逝火化得堅固一盂堅固之下疑脫舍利之字罷翁曰此余住雲居頭壇戒子也其行業最真實故末後光明大顯奇特今塔在菴側余為作塔銘新戒以攢單未完韋天示應福嚴費老人會下一戒子稟戒時缺攢單銀五錢四四載未還老人遷化後戒子夢韋䭾尊天命還此銀且曰本雖五錢以利算應二兩矣戒子曰和尚已去世將還誰乎韋天曰和尚已過可送至靈隱完此公案僧覺後遂將銀親至靈隱自陳顛末奉供先老人老人鳴鼓白衆令衆謹慎因果曰此間修造錢糧出入甚廣故韋天以此示教誡也罷翁曰此丙午年事也靈楫師初述詢之合院衆論皆同王僕以前世行善竟免鬼録崑山王燾字延符戊午孝廉選楚中隨州知州因流寇大至度勢不支乃死節州堂隨身一僕踰城逃難慮大兵過夜匿城下亂尸中夜半忽見緋衣判官偕數鬼吏張燈至點死尸一一唱名登簿鬼吏報王僕名判官曰此人前生曾積善陽壽未盡尚得還鄉何得亦死於此乎竟不登簿鬼吏去僕復走因貧病不能便抵崑其妻在家初誓堅守後因絶耗親屬勸之改嫁人衆臨門已登轎矣前僕忽到相與咤散迎衆復得完聚焉罷翁曰延符先生余硯友諸千如嶽父也僕歸家述鬼判點名事聞者毛骨凜冽允修以惡性驅妻終受蛇報太倉潮音菴僧允修三際瞽法師之徒也在家性惡好毆妻妻臨死立誓曰我死必為蛇報汝允修嘗舉以語人且曰今為僧年久離鄉又遠冤必解矣一夕法師手摸一蛇呼衆驅出勿傷他允修臥榻恰在法師單後次夜半燈火猶在允修絶呌云蛇來也衆排戶視之已斃矣罷翁曰自知有冤對惟修行追薦方可解冤允修但以路遠年深謂可幸冤業報一至噬臍何及哉蔡公子以靈隱伽藍顯應復得回生蔡方炌字介明崑山蔡忠襄公諱懋德雲怡先生季子也乙巳年遊靈隱見境地幽勝在伽藍殿中發願云何時得出家在此地修行乎歸家忽病目見衆伽藍神告曰汝欲出家已尋得天竺山前一姓唐人家頗好善汝當托生為子讀書至十八歲便得出家言訖負其魂前往家人圍哭攀留蔡君告家人曰汝可到靈隱求具德大和尚卜之伽藍若許我即可強留矣妻某氏星馳到山白故先老人率衆上供持呪哀告伽藍三卜許妻歸蔡君遂得回生罷翁曰戊申春蔡君室親至靈隱獻其夫所著回生記顛末甚悉江北僧繫戀遺財超薦得脫泰州一僧號某隨侍三昧先老人有年為某處地藏殿監院性頗慳不浪用一錢遷化後每中夜人靜殿中兩禪單僧輒見監院現形初為兩單僧整鞋面似愁苦次登上佛坐以手摸地藏華冠後嬉笑而去衆白先老人老人曰此業障必有遺物在華冠內故繫戀不捨也令舉梯上探果有銀八十金立命修齊作追薦法事訖自此永不復現罷翁曰先老人屢為顯口說王仰泉以改業修行得生淨土杭城市民王仰泉初為宰羊行首屠殺無算後因病見群羊索命心懷怯懼遂翻然改業長齊事佛親誦金剛經三藏晚因禪師啓迪復晝夜禮拜法華年八十一先見符使來追抗聲拒云我待佛來才去又過五日果見大身佛現垂手接引乃怡然而逝見聞莫不感歎罷翁曰此所謂帶業往生也然張善和止臨終十念而此則積修數十年縱有重業如多年暗室被赫日照破矣世間造業者比屋皆是孰能如此君斬截改過勇猛修行也哉有此榜樣足徵佛言不妄矣庚戌五月繼賢師說漁船以巧計沒人立報抵命鎮江京口渡一徽商附漁船過瓜州見網一巨魚遂開箱揀銀買放中有整銀不覺漏泄漁翁遂計誘商云欲放此魚須至無網船處故之乃揚帆北向至無人處暴以大網裹商人擲之江中網順流而下出沒波濤至安汛地處其中兵丁忽見大魚浮空一擲競來摝網解出乃人也尚未氣絶向兵丁白其故立拘漁翁至將軍府戮之銀仍歸商人罷翁曰此即庚戌二月事也世一喝巖二公自鎮江來目見口說沈文學以塗抹壇經招報劇苦江北沈生幼廁黌宮恃才妄作讀書蕭寺中見六祖壇經妄舉硃筆塗抹回家暴亡示夢於父曰告以塗抹壇經現在地獄身帶火枷苦楚難忍父為我到寺讀書處尋出壇經洗去塗痕庶可脫苦父悲痛不勝入寺搜訪果見原本急洗去舊痕併發心重刻一部流通為子懺罪罷翁曰六祖大師以肉身大士示現曹溪所說壇經與金經無異沈生塗抹何其妄哉幸父重刊印行流通不惟脫苦定超生善趣矣古曰因地而倒還從地起豈不然乎有數禪客見重刻本向余說支庠友以誤傷人命祿籍頓消嘉善庠友支某向負才名己酉夏赴嘉興科試白日見一鬼入腹中遂仆地發北音索命家僮急具舟載回請幽瀾寺主人西蓮師問曰汝何方邪鬼敢纏攪支相公耶鬼高聲答曰吾非邪鬼因有宿仇因緣已至故來索報蓮師詰其故鬼云吾於明初在徐中山部下為副將姓洪名洙主將姚君見吾妻汪氏色美懷貪婪惡意會某處賊叛姚以老弱兵七百人命余征討余力不支余軍覆沒姚收余妻妻縊死余銜此深仇纍世圖報奈姚君末路悔恨修行次轉生為高僧次為大詞林三世復為戒行僧四世為大富人好施豫皆不能報今第五世當酉戌連捷某年以舞弄刀筆致傷餘杭縣鬻茶客四人冥府已削去祿籍故吾得來索命耳西蓮師聞其言有序遂開示曰君言鑿鑿定屬不誣但吾佛教中有上妙經懺可以為君解冤釋結超生善逝何苦止圖報復雪一時之忿乎鬼戄然曰若得如此甚善但恐虗誑不實如果起道場吾即離支公到中堂禮佛矣因徵西蓮師立券焚化遂為起建法筵支公霍然而醒數日後復仆地發北音乃復請西蓮師責讓曰君以超薦遠去何故復來鬼曰吾承佛力已得超生斷無反覆今將來索命者乃鬻茶客四人非我也恐師疑我無信故來奉報耳言畢遂去次支公病發不信宿暴卒罷翁曰余辛亥秋持鉢嘉善寓幽瀾寺二旬餘西蓮師為余述甚詳此因果最確家諭戶曉無不知者故詮次附録隱其名表
