body:
  text: 現果隨錄序夫因之與果猶形有影焉形已有焉則影必從焉苟欲端其影先直其形形直影惡不端若不直其形而欲其影端譬如揚湯而不輟火雖欲其冷無有是處是我法門之通訓也世典亦有之曰陰德曰陽報此豈不我之所說因果者哉世有一等不信因果其陋尤甚姑舍弗論云今茲戊寅余寓黃檗書林藤氏偶携一抄本來謁余曰此現果隨錄謀上之木以布於世可耶否余把讀之乃知靈隱罷翁戒顯筆記戒顯師具德和尚和尚為我天童門下之人至其記我徑山費祖舍利一事其言可徵也又讀其述論極讚念佛功德則知蓮社中人也通編但載所親聞見現業感現果者他如宿因後報及異熟等非今所取余謂罷翁一片婆心不覺拖泥帶水世出世間有志之士勿以其言淺近而忽之也奚翅罷翁之幸抑亦讀者之幸是編與自知陰隲等錄并讀則可藤氏刻行亦何不可之有介石淨壽現果隨錄目錄卷之一陳益修以力護關廟大士賜目趙志清挂冠修行先幾免禍趙時雍施異僧一錢便獲賢嗣徐成民身理陰司刊行冥判圓通師稟受大戒頓脫無常朱綱魂遊冥府論前世判事隱圓師以禮懺放食消解夙冤碧璠毀如來衣鉢頓縮一臂張斌以念佛金錢救主危難吳澆燭以念佛作福剋期善逝吳叔寶以臨終稟戒念佛蓮花湧現王建以誤攝回生親述冥事周秀才以却暗中財立登科第顧宗伯以盡節被溺彰顯前因張儀部以持正罹難神祐全節魏應之退念開齋卒致縊死王齋公失念賣齋立致死亡福主神厭惡穢凟顯靈拽廟卷之二吳瞻樓修持登簿瑞現西方弱菴師誤用堦石託顛僧傳信石氏猪託夢免殺自投禪寺戴星歸矢口誦呪得免油鍋武昌僧為菜害猪江心招報王子房捨昭慶棟梁大彰靈異汪司馬魚頂金經鏤板傳世趙朝奉以羅漢帶回因建大寺王御史建毉祖殿得子免難張封翁以還金厚德子孫世顯錢州侯請律師授戒燭現佛像葛朗玉父子刻勸善書施人全家免難孫學憲因羅漢回生塑像竪北高峰五聖募石柱助建靈隱大殿太倉水陸期中神鬼顯異崑山安禪菴地藏懺期紀異張邇求食葷感夢齋戒圓期龔爾茂以廣施勸善文神降顯靈踈山大殿天王兩顯靈異李銓部以造像獲嗣始終守節李伯馨心念殺人却為心鬼所殺久病翁喜還夙債頓去心蛇馬給諫以禍虧齋素竟歸神道卷之三錢伯韞以老年學佛竟得西歸黃攝六篤志西方剋期善逝王奉常以累世修積科第蟬連譚憲卿創大悲壇祈嗣立生雙璧先府君以精䖍事佛屢感奇徵上天竺鑄銅像大士顯靈自賜黃泥金谿縣青蛙使者顯異寶跡黃州安國寺張真君憑小卒降筆徐亦史損財惠民隨獲美報俞春蛟以飯僧免回祿增修福行朱君以僧預為作法火難得全蔣素公以續菩薩指獲薦賢書尹宣子以難地禮懺竟得生全張鎮臺以韋天示夢安國重興二人敬慢關帝榮辱異報張其光違夢烹鱉貪饕致死王指揮以惡性為蛇隔生餘報漢口屠人不聽僧勸立招慘報高郵猪遺身換蓆始終還債蓬閬鎮屠牛惡戶立招業報居道人亂啖庫物轉身作驢曹翰以屠城為猪遇緣得救吳江路叢大報恩奇冤立雪王郡丞赴任吳地為蛙伸冤王曉江謝官修行頓躋道果賈客以誠心供佛代殺保全回子擊銅佛不壞禍還賣主癱子以禮拜觀音病愈興緣徽商堅決進香竟免火難卷之四黃州飛火亂焚獨免齋戶貧女捨一錢鑄佛勝跡不磨堯峰僧竊韋天燈油立招譴責毗盧塔鬼勾僧索債酬畢方甦二孝廉侮慢文昌身錄俱損二孝廉襲慢地藏立死受報建昌小民穢汙三寶雷神擊死甬城人以穢觸塔廟立遭奇禍陳祥屠狗怙惡不慘現身招報熊季納以精虔護法刻期獲嗣顧秀才化鶴回生尋訪得實黃封翁以行善感大士送子著大名節吳霞舟以盡節焚身神昇天史封翁以久遠齋僧感子大魁楊君以錯口救人致家溫富吳生遇仙愛命蹉過奇緣瞽者以害心劫殺己命立損吳道媼以䖍誦金剛坐化顯異方氏以虔誠禮誦盡室生還許子位以前生撿字得中高科董七以虗秤取利家財暗耗費隱老和尚逝後荼毗現多舍利曹溪原直禪師以悟道精修末後現瑞天白大德以持誦法華終聞天樂新戒以攢單未完韋天示應王僕以前生行善竟免鬼錄𠃔修以惡性毆妻終受蛇報蔡公子以靈隱伽藍顯應復得回生江北僧繫戀遺財超薦得脫王仰泉以改業修行得生淨土漁船以巧計沒人立報抵命沈文學以塗抹壇經招報劇苦支庠友以誤傷人命祿籍頓消
