body:
  text: 錢伯韞以老年學佛竟得西歸大倉錢炳字伯韞生平極淳善以明經授毗陵學愽七十餘陞富陽令慈恕越格一日鞠一大盜盜詐言冤家誣陷向公求活公作色曰汝焚燒人屋劫殺無算法應抵命盜奮然躍起攫公案錫硯向公𮌎一擲公痛仆地群吏攢盜毒毆公蹶起一手摩𮌎却一手止吏云莫打莫打我這裏不疼矣聞者絕倒後返里篤志修行日誦金剛經加以箋註深得義趣臨終心遂靈通草自祭文及偈頌命取清凉水快飲洗蕩腸胃問清凉水在何處曰放生池水也取至飲訖合掌曰我以佛力徑往清虗淨界矣熈怡坐逝罷翁曰公余父執也彭城一門皆余世好余甲申聞變出家公亦歸田學佛至太平菴下問佛法示金剛註解極其篤嗜臨行灑脫且有異徵非一生行善末路修持之明驗乎孫三錫己酉復雋天之報施善人不爽如此黃攝六篤志西方剋期善逝大倉黃攝六諱翼聖字子羽素為蓮社中勝友雖貴裔愽學修潔篤好雲捿教一門精修以薦辟宰蜀之新都治民以慈惠聲藹著相傳飯僧縣堂躬行匕簋布施繼以膜拜聞者怪之後獻賊𡨥西川所過屠戮尸骸山積數千僧感公德誓登城擊板念佛中夜佛聲震天獻賊怪問故土人答曰以黃知縣平時好善飯僧僧為打板念佛以守城也賊誡勿擾寂然而過鷄犬不驚後歸田堅修淨業己亥陽月疾稍亟余與其內兄王烟翁衝寒過其廬則四壁張彌陀像為西歸計矣乞余丙夜授菩薩戒余為極談唯心淨觀攝公曰吾神明愈徤誓願愈堅自信生西方必矣次晨與言別剋八日必行屈指果不爽罷翁曰人盡以公縣堂飯僧為怪己亥公東歸余晤於其弟颺先兄齋問公堂飯僧信否公曰此余常行不足異也竟以此免賊難非現在因果耶一生篤志西方終能剋不爽蓮臺高步復何疑哉王奉常以累世修積科第蟬連大原先文肅公王錫爵號荊石明神廟首輔雖貴顯終身不二色其立朝鼎望建儲元勳載在國史茲略紀者居鄉一二逸事也公為人謙恭溫厚獨御下以嚴好朴素不許僕衣紈綺或僕輩與人爭毆進前膚愬公必曰相府一犬人猶別眼視況人乎必先責僕公好植菊多生千餘本偶一里人向園丁乞菊丁曰明日來明日人入園適公低頭對菊坐其人不知驀拍公背曰老伯伯昨許我菊花𠰚公擡頭人驚仆公慰諭曰莫驚莫驚令童子取幾本送出其厚德如此梵字無大小皆書額護持晚年命工以金銀汁畵大士像手書心經在上施人供養不記數子緱山先生諱衡亦榜眼孫奉常烟客翁諱時敏篤奉佛教增修世德儉歲首倡糶官米兼煑粥濟民請瓶窑聞谷大師至婁創興佛法孝廉陸𠃔升字子就夢至一大寺六人挑豆至黃豆中雜以蠶豆老僧曰此皆烟客翁前生所積善業也大善記一蠶豆小善記一黃豆凡六擔子就遍告人無不知者今子九人次子揆第八子掞次房孫厚初皆進士一門厚德榮盛未艾罷翁曰烟翁全福世所希有堅修亦復希有每昧爽即盥嗽禮誦聲琅琅達戶外嘗語余曰吾十七歲持金剛經至今年垂八十未嘗缺一日每日持誦有定課皆用鈐記非夙世勇猛修習乘願再來能有此乎余與烟翁蓮社同事四十餘年知之最深也譚憲卿創大悲壇祈嗣立生雙璧常熟譚憲卿號扶風家頗厚年過壯無子合族聲言欲來折產憲卿大恨立誓曰吾寧修捨到赤貧決不為若輩分折乃賷五千金欲興大悲懺壇卜地至玄墓見梵天閣後地敞面湖景致絕勝乃陳願于剖石老人老人許之遂以香泥築地創成精灑懺壇壇就隨懺師禮四十九晝夜是年回家側室生一子衣胞皆白元配某氏素不生產亦發心損千金建一白衣閣于玄墓立願云若我亦得生育即大士有靈矣未幾亦生一子胞白如初今伯仲皆遊頖馬罷翁曰丁亥余侍瑞光玄墓靈隱三老和尚從三峰過虞山扶風設大齋見其二子居民一見皆曰此普門大士求來子也先府君以精虗事佛屢感奇徵先君諱夢虬字開雲號闇修居士幼遊泮初不甚信佛以前母吳氏勸誘忽夢巨身佛放頂光光中復現悉達像為先子授記由是篤信館海濵陸鰲峰居士家立誓結壇持呪四十九晝夜期滿之日中夜面像持呪忽見大士像走下座近身以手遍身摩按手到處骨節如火摩竟熙怡笑語云不須這等苦節勞形復點指云到某時吾遣某星來佐助汝仍步上香案從此文思湧溢又一夕夢關聖左手持紅箋右手以指作寫字勢示之先君初不解何意次日進双鳳關廟見正面橫枋無額悟曰得非欲我作贊懸此乎卜筮得三聖遂歸張帝君像焚香祝曰若聖意在贊乞助我文思纔搦管若有神助不寸香許走筆立成文不加點合鎮驚異乃醵金作扁盛儀衛皷吹而昇焉實萬曆戊午聖誕也贊錄於左瞻仰帝君堂堂丰致想當年偃月刀頭轟轟意氣何曾習定參禪妙證菩提何曾鍊氣凝神胎仙冲舉如何却嚌高真位也只是一片剛心終身持到底一句盟言終身踐到底更不知怖死貪生畏首畏尾所以志欲吞吳滅魏只為孔懷兄弟直至殉國捐軀赤心不毀到如今精英照耀日月經天浩氣充塞江河行地這便是曲能有誠誠則明矣噫嘻忠臣孝子義夫節婦何代無之曾見有異姓同胞矢心不二如大帝立箇千秋㨾子令後人景仰歸依齋明承祭效學桃園結義畢竟誰人能繼洋洋如在靈爽徹人肝肺歷代褒封普天崇祀未足展下民之志我聖天子寵眷綦隆禮文殊異上徽號三界伏魔大帝男戒顯曰先子一生內外剛方不欺暗室塵視功名篤嗜佛仙修持四十年至六十六無疾脫化面發紅光非內力有得其能然乎所著有三教真詮出世先資荷亭談道金壺平說等集上天竺鑄銅像大士顯靈自賜黃泥己酉夏余受同社一許友託董鑄上天竺觀音銅像五月十八日命工昜仲華起手作胚胎苦本山無黃泥從數里外貿得二擔心甚憂之二十日後忽狂雨連澍大殿東上白雲房有樓五間上臨危崖忽裂開二大縫献出黃泥勢欲崩墜本房仰峰師急呼大殿取土千擔樓得免壓而鑄場胚胎爐竈等充然足用矣像成端嚴妙麗絕類滅塑萬人讚歎現供大殿側座焉金谿縣青蛙使者顯異寶跡撫州金谿唐置縣初便有一神現身為青蛙稱青蛙使者至今顯靈其形頗巨也紺綠身負七金星有圓爪不類凡蛙今在水門廟每端坐一小榻受人禱祝但降福不甚降禍有相犯者但多化蛙亂集頭面或袖中被裏使人警覺時遇兵丁剁作二塊立成二蛙投入沸水蛙遂滿鍋嚴冬日入淨水碗洗浴隱顯不常多寡無定靈非一罷翁曰余以九江文燈巖道翁說丙午春仲從踈山留心往訪初至水門廟蛙不在七日後方歸主僧復初盒而示我余置左掌為說三歸五戒寂定不動說竟走竪壁如飛因贈詩曰繡谷初分壤天蛙早賦形一多難定數隱顯自通靈銀榻傳千變金精迸七星欲知神跡異今古水門青黃州安國寺張真君憑小卒降筆黃州南門外安國寺舊有睢陽張公祠正德初大守盧濬徧毀神祠誤暴公于烈日中大守一輿卒目不識丁神附其口罵曰爾以我為何人敢爾肆傲耶命具楮墨走筆書云皇天生我兮男兒君王用我兮熊羆力拔山兮風雷氣貫日兮虹霓月正明兮鎗捋劍星未落兮擊鼓掀旗搗賊室兮焚寨臠賊肉兮充饑食馬革兮既盡殺妻妾兮心悲誓為死戰兮身披鐵甲願為厲鬼兮手執金鎚亦莫指我為張儀亦莫指我為張飛是張巡兮在世與許遠而同時在東岳兮押案都統事兮陰司侍蓬萊兮殿直任酆都兮獄推景佑真君兮人間封爵忠烈大夫兮天上官資謾濡毫而染翰俾世人兮皆知大守覩此靈異慚愧惶懼具牲腥鼓樂拜而舁神歸座焉罷翁曰余庚午六月在江陰科試親見一友單裙紗袿媟慢睢陽被神擊死真君奇忠異烈日月爭光猛氣精英金剛不壞謂神明而可侮慢豈智人也哉徐亦史損財惠民隨獲美報余友徐亦史諱籕癸酉孝廉授黃岡令蒞任次遭民間回祿火後躬往編戶點名及二千家遂罄家中所挈二千金散民搭蘆蓆棚暫令棲止未欠徵國課四千金入鞘在衙明晨起解大盜知之夜統五六十人從城頭突入衙內斬劈箱篋蕩無所有以響應賊遁次日呼解夫進衙銀乃在堂前露地以蘆蓆覆葢盜不知也罷翁曰次日余語亦史曰公得保此四千金者以前日捨二千金與百姓故也捨一得二既獲對合復不損官箴非現在報應乎亦史笑而頷之又曰前捨銀與民置芦蓆而此四千金即以芦蓆得全造物機巧明明示人如此俞春蛟以飯僧免回祿增修福行杭州俞春蛟因祈嗣立願齋僧十萬八千齋至四萬便得子某年城中失火延燒四五里火已逼其門四僧來索齋俞曰家將煨矣何暇作齋僧曰但去炊煑我為汝守宅保無事俞從之飯熟僧已去反風滅火竟得無事俞大感歎復立願齋十萬八千朱君以僧預為作法火難得全朱居士亦杭人也以母好善飯僧無虗日某年一僧受齋次索二碗點書字在內却對合封函以授齋主命供家堂待有難過方啟一日杭城大失火獨朱舍得全事過憶僧語開碗視之乃下一碗書火字上一碗書水字也蔣素公以續菩薩指獲薦賢書黃梅東山五祖係是肉身楚中初亂兵丁蹂躙上山一兵欲驗肉身真偽妄以刀斫下一指兵下階隨顛狂自殺指久失忽為一村媼所得以示文學蔣素公諱文素公以重資易之命漆工仍續上完好如初壬午秋忽夢五祖謂曰念汝有續指之功令汝登鄉榜當在八十名也已而果然素公由此篤信佛法力行善事修建平政橋勒宣聖石像刻金剛經印施路口建亭施茶種種功德在人耳目罷翁曰余辛丑初移笠黃梅四祖素公闔門皆來歸依住破額七載甚得公力因備悉公行事尹宣子以難地禮懺竟得生全嘉魚尹宣子諱民興號洞庭祖太僕卿諱相父因無子廣興福事夢上帝付一僧為子隨行至中途僧頓足大悔曰吾苦修幾十載本期出世乃竟墮紅福耶決然欲返尹公苦言勸諭乃止未幾生宣子中戊辰榜進士初授涇縣令考選兵部職方因彈劾宰輔奉旨收付詔獄公見生死呼吸心懷危懼乃拉友十二人日夕懇禱禮懺以祈佛佐餘同難者或放浪樗蒲縱意飲啖反咲其迂後屈指禮懺諸公一一昭雪蒙恩釋放餘笑者多不免焉罷翁曰洞老與余頗稱莫逆初晤武昌寒溪次迓余至赤壁菴園同郭些老住數日講論佛法此二事皆洞老口述也又倪撲老諱嘉慶因工部詿誤亦在獄公日夕精䖍頂禮大士禮懺誦經滿壁忽繡出蓮華不久得釋後出家浪杖人座下主席青原號嘯筆和尚信乎佛法廣大慈門能悲救苦難真呼之而立應也張鎮臺以韋天示夢安國重興三韓張龍宇諱大治恊鎮黃州時忽夢一坐相韋䭾持杵語曰汝住華房我反住茅屋速葢殿與我張公問菩薩何處韋天曰安國寺覺而立督人詣安國尋至厨下果有坐相韋䭾在茅屋中傾側欲倒大為驚異立發五十金葢殿寺在臨皐街係蘇子瞻習靜處頺塌已極張公曰神既示夢數當鼎興余時開法武昌寒溪寺公躬造堅請重興安國余以戊戌秋經始創建殿堂成大禪席考之古誌南唐時捨宅建寺者名張大用今來復興者名張大治知必前身後身也余因裒臨皐唱和集表明斯異焉罷翁曰公總鎮崇川因一大士像海上浮來甚顯靈公請至南郊復鼎興壽安古剎創殿堂浚池沼後築金鰲山成大名勝非乘夙願力何能所至蔚建寶坊如此余臨皐贈詩曰不因夙搆空王寺安得來參老將神又崇川贈曰臨皐已創江天寺海國重開水月堂皆實錄也二人敬慢關帝榮辱異報大倉衛汪指揮最善射施百戶最不諳射某憲臺素嚴暴巡方至州施君憚之乃具牲牷酒醴乞神力于關帝止求中二箭以免責辱方禱告汪指揮猝至大咲曰為甚白日見鬼乎但以酒肉請我我教汝射百發百中矣言訖即亂取神前酒肴大噉侮慢而出施大惡之及憲司下操場汪首出射三連發皆風吹斜不中方寸遂亂全圍皆脫施信手射九矢皆中施受上賞汪綑責六十棒幾斃罷翁曰此今婁事也父老傳之最確張其光違夢烹鱉貪饕致死孝廉張其光蘇州葑門人素好食甲魚崇禎丙子登賢書夜夢一黑衣人乞命曰明日吾到汝家必祈救我不捄有禍醒以語妻妻曰姑俟之適一佃戶捕得一巨鱉狀如鍋葢縛以稱賀其光見而狂喜妻諫曰夜來所夢或此是乎勸放之其光曰物靈則能托夢此蠢物也焉有是乎立命烹之盛三大盌其光一口悉餔之當夕遂破腹發瀉不三日瀉死罷翁曰伊與余硯友鴻一張兄同年親見親聞者茂年孝廉竟以朵喪命良可歎惜王指揮以惡性為蛇隔生餘報大倉衛指揮王二初生下盆即能言隔生事言前生係山東某府大鄉官公子家累巨萬最好施予廣積善果但性兇惡捶殺僮婢無數死見閻君罰於金陵聚寶門內城磡下為蛇身既大而性不昏厭惡欲尋死乃夜以身橫城門下五更城啟為眾車碾爛蛇魂復見閻君曰汝蛇報未滿何得自尋死乎當再為蛇抵除夙業余叩首哀籲懇陳不願閻君曰汝却作得有福當受福報惜以惡性定業未消余又懇苦求免為蛇閻君曰也罷只得帶餘報去乃命託生大倉衛為指揮家亦豪富但胸前有一蛇皮班剝膩滑長七八寸濶二寸每至暑月腥氣逼人滿座掩鼻時令家僮以盆水頻頻揩拭慚恨切齒後兄死得襲職州人稱蛇皮王二焉罷翁曰此余先君同時人也時時援此以示訓誡故童而習之顛末甚悉佛經備載眾生性習愚黠面貌好醜悉係前業豈不信哉漢口屠人不聽僧勸立招慘報漢口僧號弘戒專化人放生一日遇屠者肩擐一犬僧苦勸買放屠者堅執不𠃔乃語云汝與狗夙世冤業吾不能救也合掌禮屠者三拜是夜屠人宰犬手舉下鍋忽沸水濺心頭爛七日洞穿而死漢口人感動遂醵金建今放生菴焉罷翁曰余往來漢上時寓此菴知其開山緣起如此高郵猪遺身換蓆始終還債高郵三垛鎮一村翁養一母猪生育甚繁年久致富忽夢一人語曰吾多年還汝舊債止欠一肩蘆蓆覺而疑之偶報母猪死村翁憐其有功命其子埋之子持鍬方在河畔堀坎忽一蘆蓆船至問埋何物子以死猪對舟子曰猪雖自死尚可啖也竟以蘆蓆一肩易之子頂蘆蓆回父大嗟歎罷翁曰此余西堂卓源親見者為余言之酬償業債纖毫不爽可咲可畏蓬閬鎮屠牛惡戶立招業報大倉蓬閬鎮一屠戶業宰牛從江北買牛回已抵歲暮從妻索肉食妻答無屠人奮然持刀割牛舌付妻烹煑自往房中坐向妻裝鏡臺照面以刀修刮眉毛驀地𢬢牕繩斷墜下頭劈兩開立刻命殞鎮人眾口傳述居道人亂啖庫物轉身作驢金陵華山居道人不信因果貪饕庫物後溺死門前戒公池中未幾託夢達照闍梨曰我已為驢明日當至常住還債天明果然呼居道人則疾足迫前頻到庫房索物啖習氣如故也酬債幾年果仍死池中罷翁曰此余華山典故一乘皆知因果灼然者豈不可畏曹翰以屠城為猪遇緣得救蘇州劉錫玄字玉受號心城庚戌進士初為廬陵教授應滇聘道過黔中回泊舟郵亭夢一長面偉人告曰某朱將曹翰也予在唐朝為商過一寺見一法師登高座講佛門四十二章經余發心設齋一堂隨聽經一座以此善因世為小吏從不脫官至宋初升為偏將軍名曹翰征江州久不下怒屠其城自此以來世世為猪受人屠戮今公泊舟處乃吾死所少頃第一受宰者即我也有緣相遇願垂哀救劉公蹶起呼僕視船頭果屠門也少頃門啟擡一猪出號聲動地劉倡買載回放之閶門西園內呼曹翰即應公刊因緣遍布兼載黔枝偶存集中罷翁曰猪業重性蠢何能現夢其能現夢者仍是聽經餘惠也余辛未時同公聽講台教於即中堂公口述其事余至西園猶及見此猪身好潔呼曹翰即應與人無異也然曹翰與曹彬從兄弟也武惠行軍不妄殺一人勳榮冠世曹翰乃恣意屠城致墮畜類累生酬債慈忍分途苦樂異報如此嗚呼能撥無因果也哉又王丹麓居士遂生集載劉公夢中問曹翰平日見汝等受殺時何法可救曰每當屠割時苦不堪忍惟聞念佛音聲遂解其苦望公凡見屠殺割裂經湯鑊熟食時乞念阿彌陀佛或準提呪不獨解苦且有脫苦之益言訖悲涕謝去吳江路叢大報恩奇冤立雪吳江南倉橋世官沈氏有帳船若干命僕輩詣鄉索租適一徽商附舟偶見屠者縛一犬將殺商即解皮箱銀贖之不覺露白沈僕起害心遂縛商人入大麻袋沈之河底船徑去矣所放犬呻吟河岸乃退縮數十步奮身躍入中流啣袋一拖即奔上岸如是者數次袋漸近岸往來舟子駭絕以篙一探即得麻袋見內有人為解放倒去水人漸活袋上有沈府二字人皆知為沈官家物也由是引商牽犬擕袋献之沈府主人命藏之密室不幾宿帳船歸點麻袋獨一船少一袋立問故僕曰偶風吹落水矣主命閉宅門呼商與犬出同謀僕六人皆頓口伏辜乃鳴官釘之板門活焚焉罷翁曰此余弱冠時事也萬口傳異王郡丞赴任吳地為蛙伸冤王公諱某選蘇州府同知道經句容將近丹陽忽見群蛙數百在公輿前呌噪跳擲公停輿告曰果有冤指我處所眾蛙遂群集一處公命人掘下得一死屍口中塞一鞭柄上有脚夫名至丹陽一詢而獲立屬縣令拷問乃一商買蛙放生露白而被脚夫害也立為抵命吳人因呼公曰田鷄王焉罷翁曰此先子闇修公時事庭訓嘗道及王曉江謝官修行頓躋道果儀真王曉江繇大學授邑佐偶撲一候吏忽猛省曰吾以富致官而復以賄賂故刑人豈不顛倒乎遂棄官學道家資數十萬悉以檀施傾之四十不再娶暮年豫𠠇一巨棺置房中夜充牀榻年九十餘坐化棺中頂如火熱者累日罷翁曰余新安友吳伯兼親見口述楞嚴載人死驗其餘熱生處立見古偈云頂聖眼生天人心餓鬼腹旁生膝蓋裏地獄脚板出楷定格則也蓋心存禪寂則輕清而內凝情滯愛憎必重濁而附物輕者飛越雲不下沈重者淪墜石不上舉積之一生末後自驗曉江居士以五十年修鍊而頂上火熱非證聖果必生淨土矣非曠世大達人哉賈客以誠心供佛代殺保全一賈客係遼東人路拾一小銅佛像大一寸餘繫褲帶上每食時不論魚肉必先抹佛口呌曰佛爺你先喫同伴皆咲之忽途遇大盜賈客被殺砍三刀身雖流血竟得無恙撿出腰間佛身有三刀痕賈人大哭叩頭高呌云佛爺救我也靈隱道源監寺親見口述回子擊銅佛不壞禍還賣主江寧盧府巷有一俗僧好賭愽衣物蕩盡止存銅彌勒佛一軀高二尺許貿與回子得銀三金回子夜舁像至家以大鐵鎚擊佛頭堅硬不動迸出火星回子曰想頭頂銅厚乃擊肚腹彌勒忽開口出聲大咲回子驚倒叩頭謝罪明日香花鼓吹送還本菴主僧旋遁得惡疾而死金陵僧俗口述癱子以禮拜觀音病愈興緣楊州一癱子泰興人病癱數十年一日捱到池頭洗澡摸著一磁觀音像遂供矮屋每五更東隱菴打鐘即起禮拜勤苦五年忽夢一老媼以手按摩其體呼令起來答曰吾癱已久何能起媼曰不妨今能走矣醒而立地頓能步履東隱一僧為披剃男女驚異投金錢供養者頃刻得五六十緡江都令母氏施以重貲遂用建菴曰存濟今供像其中焉伊目侍者與維楊眾僧親見口述徽商堅決進香竟免火難明末一徽商姓汪僦居崑山王澄老對門持齋三載擬至普陀進香某年元旦已往東門玉龍橋下船矣忽店旁起火急報促回汪君曰吾儕三年方赴南海豈以一店易吾志乎縱被吾不歸矣竟揚帆而往香畢回崑見四面店廛及王氏閥閱大門都焚盡汪店樓房獨存萬人驚歎此在崑目擊
