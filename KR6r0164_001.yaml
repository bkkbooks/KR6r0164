body:
  text: 靈隱罷翁晦山樵戒顯筆記陳益修以力護關廟大士賜目陳益修字玉笥山東濟寧州人為諸生時見回回教門楊生花等欲毀關帝廟擴大回回清真寺陳公力訟之官得𥨊後癸未春流賊破衮州生花等集千百衆乘變團練回回兵途遇陳公以前忿呼衆捶擊立斃之且剜去其兩目復矐以灰擲尸於其舍陳公自見變為中陰身止二尺許守其尸中夜忽見關聖降其家謂曰我分中亦不在此一廟只難為汝好心致喪汝命然汝陽祿還未盡應有功名分吾當使汝回生陳曰感大聖厚恩但吾兩目已去縱回陽世已是盲人豈能復讀書作舉士業乎關聖亦沈吟少許乃曰無妨吾當請觀音大士來必能賜汝目言已便騰空而去須臾復至曰大士來矣尋見大士身披白衣如仙姥狀備極相好關聖指陳公代為乞目大士微笑曰此極不難乃向空中一喚俄見一天童子手携大筐籃以荷葉蓮花覆上大士揭開乃皆眼𥅲也即手拈二枚令取酒一巵吞之陳公強飲咯咯有聲戄然而醒中陰形即隱而陳君兩眶中已得眼矣關聖送大士去乃謂陳曰汝不必復思報仇不久大清一至此輩無噍類矣明後年汝當聯捷果乙酉舉于鄉忽一人遺之書曰陳字東畔方生耳益字草頭八血全修字一夕三人臥關字門內隱八天公字老翁成羽化默字黑犬佑字右人牽聯字耳邊絲亂墜科字禾斗永相連益修不省意義亟視其人已失所在牘背大書陳益修關公默佑聯科九字始悟其旨果中丙戌進士任戶部郎中權關荊州後生花作亂宗族十三人寸磔於市罷翁曰此事初聞之陳旻昭先生寓余弟子顧伊人刻之武安王集者也次黃梅令徐長午亦曰此余姻親也其事極確無不目見者但其眼𥅲微小直視而光外溢與平人稍異嗚呼陳公以好心護廟感此奇緣大士以千手眼轉瞽復瞭神通廣大海口難宣矣神佛報應速於反掌可不懼哉趙志清挂冠修行先幾免禍趙志清山東人以孝廉選河間府贊皇縣令居官三年廉明仁愛萬民頌德忽一日至凌聖功大守處告退大守問何故趙曰某以知宿世因緣故不得不歸大守益怪之問宿世云何趙曰某前生於某大法師會下為聽經學者法師有定力能通惠余二十六歲以疾臨危師謂余曰汝道力未堅此去已入紅福以未曾修大福亦不能登甲榜僅一孝廉知縣耳然止許三年若多一日大禍即至矣可急流勇退入山修行還得見我言訖遂終自入出母胎本性不迷歷歷皆驗今三年既滿決意入山矣大守勉白直指公李灌溪住不及放歸旋有劉姓者補其闕未半月賊至城大破全家被害罷翁曰凌聖功諱必正余同里同社友也初以行人選建昌太守調河間府任滿回鄉為余說此事李灌溪諱模字子木長齊學佛亦余道友所言無異趙時雍施異僧一錢便獲賢嗣麻城西坂劉某隨族叔劉伸至真定府固城縣為主文曾密救二人命後闖賊至城潰縣令出走避難劉君押其家屬回黃途遇賊兵被殺其神魂返麻城謁東嶽帝曰汝救二命應得善生帝令侍吏訪城中之善門無子者吏以醫生趙鳳儀號時雍報帝令取善惡簿察之見趙君曾淹死五女法當絶嗣又撿善簿見某年於大雪中曾施錢一文與寒乞僧僧乃菩薩假裝寒相試人者也帝曰此一錢功德甚大應與其嗣遂遣劉君託生臨行帝語曰汝去九歲當有孝廉贈汝妻某歲入泮某年補廩一生享厚福後趙氏生一子才出母胎即呌云我西坂劉某也東嶽帝遣我與趙氏為後已不必言但吾生前尚有産業借貨彼此未明速喚吾妻子來趙時雍即請其妻拏至小兒歷數舊逋令妻子依券索之分毫不爽九歲果為鄧孝廉壻後功名出處一如帝命焉罷翁曰此事余友梅惠連有紀事流布戊戌冬余在黃州安國寺患脾疾甚苦適張龍宇鎮臺請趙君時雍在署令整余疾應手而愈余問令嗣生下地即能言真否趙君曰千真萬真余詢某名與字趙曰特為此故名曰默字弱言而東嶽冥中種種公案則皆豚兒口述也徐成民身理陰司刊行冥判太倉徐成民庠友季生之子幼持齊好善與友結社念佛忽奉帝命充冥官從崇禎庚午年始晝為書生夜則判斷冥事每日至夜分中堂暗坐體氣俱冷兩眼上撑呼鬼兩造判決如流音響洪厲陰風颯然左右耳旁置燈火紙筆記録裒成大𠕋題曰婁東冥判九州管內處處流通判善惡報應如照瞻臺覽者不寒而栗罷翁曰此余庚午念佛會友也為人淳厚質撲木訥寡言除讀書外止知念佛忽受冥職音吐高亮一字一句斬釘截鐵固已奇矣更奇者三教典籍從未寓目一當對簿則引經據史出入佛藏字字精鑿真不可解冥判中有數則公案出余手録文不加點未嘗增減一字如是者十餘年成民乃作自言初為閻君分司死去實受職此婁東昔年一大異事今所目擊而身相與者也圓通師稟受大戒頓脫無常僧圓通常熟梅里人中年持齊忽奉閻君批文命追攝生人初至冥府見頭門外有一井亭奉符者到彼著皮襖持大裩戴虎面向井一照身即騰空渡海穿山頃刻千萬里所攝人擐在棍上肩而飛行雖一二十人輕如羽也每五日一值班圓通心厭之百計求脫未能也乃出家剃髮為僧依舊供職逮至于乙酉冬同惠天師至玄墓剖石老和尚座下稟受三壇大戒畢其役頓除永不充追魂使矣罷菴曰惠天師與余最為莫逆亦梅里人與圓師至交厚親見其為治無常十餘年乃脫如來所制清淨大戒為冥中所重如此亦異矣哉朱綱魂遊冥府論前世判事嘉定一老儒名朱綱平生方正不苟頗信佛老忽一日見二冥使來請便相隨前行至一大宮殿知為冥府少頃閻君打鼓升殿司門者報云東昌府知府進朱君聽是知府心遂不驚上至階閻君下座相揖賓主坐定閻君曰公在任時判許昌弒母一案得無過當朱君一聞此言前世境事忽然現前對曰許昌實不曾弒母毒殺其母者惡妻也許昌外歸一知消耗即當黜妻首官正罪方是孝子乃以情愛難割含糊隱忍猶同枕席是雖不親弒母而以春秋許世子不嘗藥趙盾不越境例斷之是與於弒母之甚者也斷曰弒母誰曰不宜閻君首肯曰公言甚當乃揖令下階敕引遍視地府方送回陽朱君由此長齊修行杜絶世事罷翁曰曾見其子為父刊實録遍布道俗請余作序故知其詳隱圓師以禮懺放食消解夙冤江北僧隱圓參學天寧某年六月暴亡母在泰州報到膚已粘席矣將殮復蘇細言前世曾作令某縣自侵庫銀嫁禍庫吏復計殺之以滅口吏恨極訟之閻君追攝對理冥君勸庫吏云彼既出家為僧汝決意報復何如以法力超薦汝乎隱圓承旨遂立願三年日禮千佛懺夜放蒙山以釋夙恨吏首肯遂得回生因乞一冥使引遊地府到一大會處榜曰補經堂中有數百僧道乘光誦經須臾復暗隱圓問何處所冥使曰此陽間僧道包攬施主藏經雖得財而經未誦故在此補也又問頃刻即暗何也答曰以業力深厚不許便使補完故遲久光現現而即收使久處黑獄也隱圓回生三年酬願畢復參學靈隱焉罷翁曰天寧靈隱衲子屢向余說情事皆同補經一欵世間釋道視因果為兒戲孰知陰中一一不爽如此與其久處黑暗地獄不得補經孰若乘此日月三光之下為施主了此功德之為快哉稍一捱排噬臍何及矣碧璠毀如來衣鉢頓縮一臂麻城一富僧碧璠曾捐百金助村民築塞保衛一方徒無窮欲受戒璠不許徒夜走至杏巖和尚處稟戒而回碧璠一見大怒裂碎三衣撲破瓦鉢當晚方睡即見韋䭾尊天震怒痛罵云汝是何人敢毀如來法器耶立欲以寶杵擊之璠叩頭求懺韋天曰念汝修寨有功姑去一臂以杵輕輕向右臂一點璠狂呌而醒數日內忽右臂暗消止長七八寸手拳如小橘縣肩上至今師徒皆在焉罷翁曰余師姪吼木與璠鄰居述其事甚詳張斌以念佛金錢救主危難寧波一小民張斌住崔尚書廊房業織蒲鞋性好修行長齊念佛夜以蒲鞋剪下草鬚念佛一數珠即記一莖裝竹簏中每歲除夕焚地藏殿寶庫內已幾十年矣適崔尚書患發背死至冥府冥君怒目數其平日過惡崔公曰能縱我回陽一修福業以贖罪乎冥君曰汝所蓄皆作業錢此間用不著汝租屋民張斌反有金錢幾倉在此能易一萬來罪可解矣崔曰但釋我回此事極易張斌赤貧何以致此冥君曰凡人齊戒至心念佛一聲此間即注一金錢或又散心念佛一聲亦注一銀錢張斌至心念佛以蒲鞋鬚記數積有幾倉耳遂放崔回陽立呼張斌告曰汝陰府積有金錢可兌一萬與我張斌力言無崔公曰汝以蒲鞋鬚記數燒地藏紙爐者是也張斌曰此誠有之若果有用但隨尊意乃令書券以實銀一萬易之請僧焚券回向崔疾漸愈張斌曰吾年已邁無用此物矣乃以其銀造一大橋費幾千金復建一菴接衆至今號張斌焉罷翁曰余昔館錢希聲州侯署中希翁昆弟數為余言此事丁丑余參天童密老人亦曾過此橋蓋確實非謬者張斌以至心念佛致令金錢積成倉庫後又加以造橋接衆廣大福德若能回向西方決定高登不退矣念佛利益殊勝如此惜乎幽明相隔世人不知安得起張斌而遍告道俗也哉吳澆燭以念佛作福剋期善逝蘇州一小民姓吳業澆燭故以彰名僦居婁門一屋孑身長齊晝夜念佛以為人至誠吳閶內外數十大燭鋪皆爭迎澆燭念燭係供養神物三寶必念佛數聲乃澆油一杓一生如此年七十餘忽語一至親洽店主云吾積有薄資本為防老今以念佛功成至某日吾即去世生善處無用此矣敬以相贈主曰汝所積者乃衆店物非吾一家物也何敢受乎若必無用處請為汝作福吳君大喜乃以匙鑰授主令至所居地窖取出約有千金主為分給蘇州衆大剎齊僧及菴院接衆處皆分惠作福竟吳君如期合掌念佛端然坐逝吳門道俗送龕火化者千萬人焉罷菴曰此崇禎甲戌年事也余館周恆中齊其家僕陸君送龕回稱述不已此君與張斌行履相類一生至誠念佛末後皆作大福或佛菩薩來迎徑生西方未可知也吳叔寶以臨終稟戒念佛蓮花湧現太倉上舍吳叔寶諱鳴珙家資殷厚素好善預放生會然不甚通佛法六十餘自言欲脫化忽沐浴命延隆福寺印初法師宣授三歸五戒竟大呼出去者再合掌逝矣頃復開目語妻兄王煙客生先曰吾才發永絶塵世願勇猛念阿彌陀佛從床下躍出竟是蓮花世界自省平日何善乃獲此世人努力言訖索水自照中夜恍然悟曰今生吳叔寶前生徐和尚復大呼快哉而逝傳有異香發于室罷翁曰佛法一也然臨行發願冥地念佛功必烈于平時者專與不專也平時散心念佛萬千未必得力屠者張善和十念遂得往生獵夫聞杈上鈴響一聲稱佛蓮花湧現者何哉蓋由死臨冥界獄火在目大怖切心更無攀緣更無審顧驀然佛號一聲如大震雷如泰山崩平時積業不啻陰霾迸散而纍卵粉碎矣尚何地獄不空而淨土不現哉叔寶以僧轉劫既有夙根臨行又稟歸戒勇猛念佛蓮花湧現無是疑者世人努力實乃至言也庚午余曾同叔寶放生海印菴王煙翁奉常父子皆有傳記見聞最確王建以誤攝回生親述冥事吳門王建素行謹節忽一日無疾晝死隨青衣至冥府閻君鞫勘係是誤攝所應攝者乃山東王建也建由是得生出冥殿見地獄黑焰蔽空嘷呌聲如雷吼三老僧跏趺大樹巔每獄人痛聲騰沸以淨水灑之聲即停寢建近前詢之則觀音普賢地藏三大士也建與報國茂林律師素相識見亦在冥府袈裟杖錫如平時罷翁曰建自有回生記茲止撮大略周秀才以却暗中財立登科第明中葉有周秀才諱某素方正家極貧賃婁門韓家潭子屋一間折舊竈竈底方磚下得二元寶妻大喜周君曰此不義財也豈可得乎取筆書銀面云若是我的財須是明白來竟袖至胥門外登渡船擲之中流而返舟子親見立呼漁翁投之摸之漁翁藏銀別處詐言不見二人大閧訟之大守大守欲加刑二人吐實乃押漁翁立取銀至見面有字命貯庫是秋鄉試周公竟中舊例本府小鹿鳴宴每舉子有牌坊銀百金置面前書字銀二笏恰在周君前衆共驚異後成進士罷翁曰此所謂明白來也周公絶世迂闊成絶世方正使染指暗物福澤定止此矣安有後一段奇事乎人人知科甲為大利當小利現前人人忍不過嗚呼周公迂闊真大學問豈易及哉此周翼宣業師鄉友業師古君子也纍為顯言如此顧宗伯以盡節被溺彰顯前因崑山顧瑞屏先生諱錫疇字九疇崇禎朝官大宗伯甲申國變後闔門悲慘誓以死殉父筍州翁自餓死瑞翁復在溫州丙戌六月十六日為同事賀君堯所害沈之江華亭令張調鼎字大羮公門生也好請乩仙忽瑞翁來降大羮怪問曰老師何時登道山乩曰吾於前六月十六日被副將賀君堯害我於江中矣張問賀與師何仇乩曰老夫前世乃天台一老僧也因托鉢回路逢巨蛇以杖擊殺之賀即蛇後身也冤對相尋因果應受可語我兩兒切勿報仇張公立遣人至溫州蹤跡之一一不爽罷翁曰余己丑秋在吳中開元寺硯友吳純祐承晤余以其曾為永嘉令談及瑞翁事純祐曰此弟所身經而目擊者也丙戌六月十六日弟宴瑞老於江心寺月夜話別明晨報瑞翁被害弟召募漁人捕之無影嚮當夜夢瑞翁立水中余急命掖之登舟瑞翁曰余前世為天台老僧誤殺一蛇今抵其命承公厚意營我後事者以公前世係我徒孫有方外一脉親故也明日但向某灣尋之余即在矣早起詢漁人果有其灣一尋而獲乃力助扶𭣋歸崑祖塋焉純祐諱國庚辰進士後君堯入海亦為人所殺張儀部以持正罹難神祐全節太倉張受先先生諱釆事母至孝崇禎戊辰未發榜前有友夢會榜第三名下注孝子二字生平不甚信佛獨信關帝乙酉元旦夢帝送一乾坤正氣扁到家公大喜逢人說項先是州中豪傑吏胥多結黨蠧民公負性剛正白於錢希聲州侯案治其罪群小銜恨欲甘心焉是歲五月十三乘亂要劫公於路擁至城隍廟叢毆慘酷血肉糜爛有童子自外入見城隍神以身翼蔽公公僵仆不動群小謂已死也命丐者負公尸棄之小較場關王廟側夜分廟中一僧謂同住者曰張公正人也尸棄於此恐有毀傷吾等當舁還其家然無別物可盛乃下一乾坤正氣扁舁焉到家以酒漿灌之忽唇動得蘇調養不半月而愈真神祐也明年捕凶黨駢斬於市戒顯曰公係余諸生時業師也素不信僧獨敬崑山西寺空林禪師謂是真僧戊子五月三十日垂易簀命請至語曰吾儒書都讀過獨未留心內典今命已垂盡靜思佛法一著最妙生死關頭斷斷少他不得惜無及矣生平以僻見反有口業特請數僧禮梁懺一為洗滌懺完吾即去矣故此告別至酉分問曰懺完未答已完遂泊然而逝嗚呼師嚴氣正性動思濟世雖以忤群小罹難然自此以後絶跡人世不入城闉不面當事遁于荒野卒得全歸焉知天不以此玉成其志節哉平日雖與佛法無緣而臨行悔悟其言大善豈非夙有惠性現名士宰官身者耶昔顯頻侍師側商確古今文藝極蒙器受一談及佛法便面赤責讓及顯以甲申之變動哭別廟焚書出家師却極口讚歎甫里許孟宏居士請余闢梅花墅為海藏菴師遺書獎曰原達以勝人宜居勝地吾師乎惡知他生後世不為佛法中一大知己乎周相與至深悉顛末甚詳附記於此魏應之退念開齊卒致縊死崑山魏應之居真義鎮魏子詔族姪也崇禎庚午春與子韶同榻𥨊忽夢中狂哭大聲念佛子韶驚問故應之曰夢至冥府見曹官抱生死簿至余問我在簿否官曰汝別在一簿固索之乃在縊死簿上名下注云三年後某日當自縊書寮余哭問曰我何罪至此官曰定業難逃問何法可免官曰除非齊戒念佛精進修行庶或可免遂語子韶曰姪從此一志修行矣遂持長齊曉夕念佛精進者八閲月後文社友衆咻曰此夢耳何為所惑乎漸漸意改遂開齊戒癸酉春無故扄書齊門縊死屈指舊夢恰恰三年罷翁曰癸酉余下帷子韶春祺堂中應之時來聚首忽一日袖一宋搨黃蘇帖贈余曰此舊館范長白司馬家物也余不受應之固留余案不三日其子披髮蒙面哭報應之已縊死余大驚乃售此帖與社友顧仲莊得二金易棺與之其大異事王齊公失念賣齊立致死亡麻城東郊外齊公王君長齊三載忽染惡瘡周身糜爛痛不能忍心生退悔一親友往問疾慰諭曰公持齊人也佛天當默祐汝王君曰吾持齊三載反招此惡報齊有何益乎友曰汝意不欲此齊賣與我得否王君曰如何賣友曰算一分一日三年當得銀十兩八錢也王君大喜遂書券得銀明日將破齊戒當晚忽見二鬼使來大罵曰汝以薄福十箇月前命祿已盡以持齊故延捱至今今乃賣去命算反透在汝身矣立勾攝逼行王君叩頭流血求緩一夕當退銀誓復長齊急呼親友索券友曰吾昨持券歸便於佛前禱告焚化矣王君悔恨立死罷翁曰余丙申閲藏麻城新禪堂闔縣齊公來言親見此事福主神厭惡穢瀆顯靈拽廟麻城東宜州市上有一福主神甚靈其廟向河隔河市人不知回避排數十尿桶往來人溲溺恰對廟門忽一夜福主運神力拽轉其廟背河向野至今稱反壁廟焉罷翁曰不論僧俗當修細行凡大小便利須擇隱處或面牆壁或傍竹樹斷不可向三寶塔寺及大小神廟即虗空日月星宿等皆宜回避若恣意溲溺獲罪無量戒律部中極論此事觀反壁廟事可悟詳
