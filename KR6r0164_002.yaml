body:
  text: 吳瞻樓修持登簿瑞現西方太倉吳瞻樓晚年以家事付二子篤修淨土專注西方不雜餘業每日念佛幾萬外經則大小彌陀呪則往生觀則西方皆登簿𠕋寒暑無間如是者一十二年後七十餘定課不減西方聖境累現目前親見欑盒每格下襯錦繡上堆妙果其架大如田一畝床前不時白蓮湧出大如石臼童稚皆見乃怡然脫化子乾行字潛九孫禊凡次子泰行字交三孫函白皆以學佛世其家焉罷翁曰此顯前母外王父也其修西方每日記課似極拙鈍而又著相登記十有二載長久不癈卒以此而得成功可知淨土一門貴在積功累行竟不必詳言著相也弱菴師誤用堦石託顛僧傳信湖州白寺弱菴律師嗣蘇州報國茂林和尚寺中建大悲殿少堦石一施主潘姓者捐二十金令完此公案師以東圊未成眾僧不便權借堦石作窖後施主來見問故師曰吾已別作一好功德再尋銀完堦也施主甚銜恨後弱師迁化後一沙彌忽發顛主事者以芒繩縛之反鎻一室明晨沙彌忽逸出人問誰為汝解縛關鎻乎顛僧曰弱菴和尚也眾疑誕妄弱師旋附沙彌口曰他非誕實我也因我誤用大悲殿堦石作東淨冥府常以大石壓我苦楚不可說汝輩徒眾速為我起石淨洗供起集僧誦梵網經吾苦即脫矣徒輩曰和尚何以附此沙彌乎師曰虧此沙彌已顛頭上無大光吾得借彼傳信不然吾受苦無期也徒眾如命起石并集僧誦梵網經師乃去罷翁曰余學人笑耶在白親見口述迨至武林人人指為實事石氏猪託夢免殺自投禪寺黃梅石氏子牧一猪前二足五爪因請道士作醮乃以猪售與屠人取貲酧道士明晨將殺矣石氏之母忽夢東禪寺六祖誡曰汝家所賣五爪猪此殺不得者可急贖回不爾有奇禍母問師何人祖曰我即六祖汝家連日在我殿上作齋醮道士無知妄以三清像蒙在我面前汝還不知耶母懼然而醒念果有此事方為歎異是夜屠人亦夢一猪身服人衣謂屠人曰昨石氏賣我在汝家我非猪乃人也不信看我前二足係五爪汝殺不得者可急急遣我還本主送我至東禪寺修行去屠人夢覺大驚果不敢殺凌晨牽猪還石氏互相述夢大為託怪乃共語猪云汝既有靈往任爾到何處修行去猪即出門望東禪寺投奔並無人引導也主人鐵壁師命之曰夢修今不論親踈呼夢修即應余乃為授三歸五戒焉係甲辰年五月初三日事戴星歸失口誦呪得免油鍋蘇州孝廉戴星歸諱吳悅父宜甫從兄務公石房皆名士也悅生而雋惠父質其功名于無業泐大師乩判曰此子以工部終身及長某年登賢書員性癡狂行多蕩撿大不利于鄉黨吳中呼為戴癡既而受害者眾罹其惡欵控之工部工部鞠勘得實加嚴刑卒于獄忽本城某暴亡家人以身暖三日未殮已而復甦告家人曰速買一舟吾欲往嘉興去家人皆訝曰人雖甦而語帶邪未為佳兆也某曰吾並非邪前在冥府見一奇事急欲往彼一勘驗耳家人問故某曰吾在閻君處見本城戴癡適解至對簿閻君見其惡款盛怒立命付油鍋殿前平地上即湧一油鍋獄卒叉戴癡下鍋戴厲聲呼南無喝囉怛那多囉夜耶一句油鍋迸散復為平地地上湧一蓮花冥君謂獄卒曰此人惡極法當加刑然再誦呪刑復不成矣須訪一行惡之家令他託生自受報去獄吏奏嘉興一府吏姓某者三世為惡適打醮求子冥君即勅令去投胎限某時日生吾去彼正其時矣家人不得已具舟持行至嘉興果得其吏適生子已三日賀客填門作湯餅會與冥中限日一一不爽所言工部終身者乃斃于工部以終其身也罷翁曰昔金聖歎館戴宜甫香勳齋無業泐大師附聖歎降乩余時往叩之與宜甫友善見其子方成童美秀而文瞳如秋水宜甫指謂余曰此子他日必官工部而孰知泐師竟藏隱語耶然宜甫篤信大悲呪故其子亦童而習之雖癡惡病狂而冥府油鍋卒以失口誦呪而免嗚呼佛法神奇梵呪靈驗真煩惱海中大甘露也武昌僧為菜害猪江心招報僧某在俗時種園為業偶鄰家一猪食其菜怒以鋤捶殺之後出家住武昌北門外三官殿夜夢一黑衣人謂曰我止食汝幾莖菜便害我命我今已變為虎汝縱往天上必報汝仇也僧寤而恐百計思避皆非善地獨東門外有龍蟠城突出江心壁立數仞非舟莫渡僧遂往拪止忽一日早起出門望江見一獸浮巨浪而來意謂是牛也近前矚之忽躍起一虎嚙其僧立斃萬人皆駭係甲午年除夕也罷翁曰余住寒溪安國對江適在其處千萬人皆見王子房捨昭慶棟梁大彰靈異崑山王澄川先生諱永祚官鄭陽制臺時買大楠木十餘棵回崑中有三株最巨長十餘丈夫人吳氏篤好佛謂兒子房曰視有造大佛殿處必捨此為棟梁乃浸在西關外園前大節鉞王公欲造水車船點兵丁取其木初百人增至二三百人拽之屹然不動王公不信親巡至崑點兵垂五百人拽之復不動王公歎曰此神木也杭州昭慶寺適建大殿及天湧戒壇缺九架大棟梁僧徒往子房告募子房曰此先母夙願也然王公曾數百兵拽不動師能拽之吾即捨矣寺僧遣四十餘人牽挽之立行今巍然架在兩殿為西湖巨觀罷翁曰子房在江陵護國寺為余親述余至昭慶瞻禮不勝嗟異汪司馬魚頂金經鏤板傳世楚黃梅汪靜峰居士諱可受官大司馬長齋事佛偶舟次江潯日色將晚忽見萬魚頂一木匣浮水面公命舟人摝起置於船頭一夜蹴踏有聲似有天人朝謁心甚異之早起劈開木匣乃一部篆書金剛經也三十二分每分各篆文一種公立請書家洪公度摹勒刊板自作序流通以係龍宮物也仍焚香頂禮奉還江流至今刻本流傳於世焉趙朝奉以羅漢帶回因建大寺休寧趙朝奉同伴走海洋回忽熱病死同伴棄之海山沙灘揚帆徑返趙君被海風一吹復甦見海天浩蕩四顧無人乃撥榛莾歷盤曲上至山椒忽見平處中有大寺金碧輝𤾗喜曰吾得生矣乃投寺見異相僧四五百懇求收䘏一僧引至厨下令充火頭一住數月偶問一老僧曰但見眾師早飡至午齋都不見何也僧曰赴施主齋去趙君曰弟子雖未削髮為道人已數月可携我一齋乎僧曰可次日傍午老僧招至僻處告云我等皆羅漢也汝有夙緣吾帶汝去乃令入褊衫大袖中打坐立即騰空大海波濤聲甚洶湧旋聞鷄犬人煙知是城郭有一家場聚眾僧振鈴宣疏云奉為已故趙某府君修齋禮讖乃其子為父週忌追薦也趙君動念曰安得一傳語為家人知我尚在乎老僧已知語曰汝欲傳語乎趙君曰諾令出袖置屋脊上回頭忽失老僧家人驚見屋脊有人梯視乃朝奉也一家喜踴趙君雖喜恨失羅漢又極悲苦乃𦘕海上寺圖損資數萬創一大寺額曰建初現在休寧城內乃明初事也罷翁曰余己亥夏曾至寺見殿無數主人惠文師留余齋深悉顛末王御史建醫祖殿得子免難御史王珙字大美號長石蘄州人官蘇松直指初苦無子以祈嗣請於先師三昧老人老人適開建黃梅四祖師令創醫祖殿於正位必保得子公篤信頓發肯心乃獨力創建備極壯麗甲於楚中殿告成公旋得子又闖賊將破蘄忽一老僧趺坐公門七日公出見問何所募僧曰不募別事止化居士一門剃髮出家公曰吾忝在官家云何一門能剃削乎老僧曰稍遲大禍立至矣言訖忽不見公恍然大悟曰此必四祖現身說法也乃聚青黑衣帳幃幔盡製為僧帽將百頂一家老幼皆剃髮忽報城陷遁入城北隅四祖寺全家獲免罷翁曰此余四祖現前公案也公建殿本為祈嗣乃一家九十餘口因此得全所謂買鐵得金也嗚呼能謂佛法無靈而作福賺人也哉張封翁以還金厚德子孫世顯余崑山友孝廉張鴻乙諱立廉曾祖虗江先生諱憲任雲南御史其父初操一小船為業忽一村翁來僱船手携一黃布袱問何往翁曰余年老無子止一女在某處有田一頃已變價携往婿家養老矣到岸已晚村翁遂去舟返原處次早掃船見黃布袱在手提甚重張公曰此昨老人養老物性命所繫也仍不遠五十里艤舟到泊岸處候至傍午見翁杖而哭至張公曰汝物在敬來還汝也翁大感欲分惠公不受生子虗江先生登科甲為顯官孫魯得乙丑進士晉江令魯傳初任學愽後亦居高位魯唯癸丑會魁歷任至八閩方伯子孫蕃衍所居地今名張浦罷翁曰虗江先生教養皆寄外家初預童子試有名欲就府試到舟別父曰已出案欲往府父驚曰兒有何病出汗耶其愿撲如此附發一笑錢州侯請律師授戒燭現佛像己卯年余初館州署次年州侯錢希聲諱肅樂以催科勞頓大發吐紅忽夢一垂髮老僧告曰汝欲病愈須受菩薩戒覺請余垂問余曰現有三昧大律師在崑山曇華亭非奇遇乎希翁急具禮屬余敦請余就道其夫人董氏最好佛每日佛堂燃大炬數十是夜復燃燭懇禱曰若請大和尚授戒夫病得愈求現瑞相禱訖見佛前數十炬上皆現蓮華佛像螺髻面目一一精細經時不壞次日昧和尚至榻前希翁一見驚喜曰此即夢中所見也為秉爐授菩薩大戒病漸愈罷翁曰希翁治婁五年釐奸剔蠹矯正風俗為良吏第一余教其兩弟肅範肅遴在署四載請授外唯坐禪禮誦通體是僧希翁間進一談佛法而已現佛事闔衛人親見鑿鑿不誣然三昧先師晚年道行愈高神屢顯異如九江鱘魚觜馮大王崑山金小乙神梁溪城隍皆現身乙戒降乩傳示世人不獨州衙現像也葛朗玉父子刻勸善書施人全家免難崑山葛朗玉諱錫琬次子穉堅同心行善好刻勸善書布施集太上感應篇廣疏法華感通錄刊板流通己酉七月初六崑城破父子俱匿後園草莾中兵衝入搜索獲朗玉朗玉狂呼稚堅憤思救父從草間奮然躍出曰此是我父切莫害兵曰有金銀即不殺穉堅疾應曰有引至梅樹下以所瘞一皮箱六百金與之兵感其意反為守門三晝夜全家六十口無損罷翁曰初稚堅以二書屬余作序余草就戲語曰喬梓有此大善即有大難無妨矣未幾果應流通善法功豈淺鮮稚堅於危險中能捨身財脫父虎口不惟精誠兼有膽氣真至孝也孫學憲因羅漢回生塑像竪嘉善孫籕字殿英十二歲往嘉興府預童子試被叢人推門壓死一晝夜魂飛空中經靈隱寺過見十八番僧以手牽挽拽轉其魂送還原處夜半復甦身在黃正廟也後登進士榜到靈隱見飛來峰冷泉亭宛如昔所見乃悟番僧皆羅漢也任山西學憲回復至靈隱適遇建羅漢殿遂發心塑十八大像并懸扁竪以紀斯異焉罷翁曰癸卯年余先師具德老人重興靈隱方建五百羅漢殿孫公適至見上梁遂發心塑像康熈丁未余繼住靈隱孫公復來懸扁作記立現嵌羅漢殿門側北高峰五聖募石柱助建靈隱大殿康熈辛丑具德和尚鼎新靈隱大殿少一石柱無從購覓杭城屠居士名成鳳夢峩冠者五人降其家語曰汝家一石柱可施我士問何用神曰助建靈隱大殿問尊神是誰答曰北高峰五聖也夢覺到靈隱察探果然其家祖遺一大石柱在三板橋劉家園內立施到寺今殿之西南隅一柱刻五聖尊神勸助者是也太倉水陸期中神鬼顯異乙酉遍地屠戮冤鬼充斥婁東紳廉士庶屬余超薦余就大西關外地藏殿建大水陸期場四十九晝夜後為淨土懺壇中堂誦華嚴下堂禮誦雜經懺并作法事余夜分親聞鬼嘯一夕焚疏群鬼歡踴出聲市民葉華字瑞芝及庠友陶子安僕俱以不淨穢觸壇場見神槌擊而卒崑山安禪菴地藏懺期紀異余哀愍幽趣撰地藏懺儀既成友王周臣發心刊板兼施百餘金令就崑山安禪菴集僧修禮薦室吳氏余以戊子九月望日起期張占三居士遠居張浦隔二十餘里絕不聞耗預於十四夜夢至安禪菴中見壇場嚴整眾僧執爐禮懺拜問所作何事主僧答曰禮出地獄懺少頃便見無數罪人皆破頭𠢐面截手斷足流血被體數百近前僧以水灑曰生天去罪人即騰空去如是者數番占三驚顫僧告曰汝當受五戒方免此難占三即跪稟受醒而大驚凌晨疾趨至邇求弟齋述夢邇求曰今日安禪菴中願雲師方起期修禮地藏懺非出地獄懺法乎占三駭絕立奔至菴誓充勞役終期不懈張邇求食葷感夢齋戒圓期崇禎戊寅冬余硯友張邇求諱立平請三峰大樹證和尚於山北清凉菴起禪期迎和尚進院畢邇求回宅偶食鷄子鮮魚是夜忽夢至菴門見龍天八部青髮獠牙種種異狀五十六神大隊出門欲去邇求倉忙問曰眾菩薩何往答曰吾輩護道場神也爾為期主回家食葷吾等不願護法欲散去矣邇求夢中叩首流血苦陳懺悔眾神復進邇求由是終三月期堅持齋戒罷翁曰次日余語邇求兄曰此龍天因兄久興佛事積有厚福故示夢以完期也萬一福輕無以嚮應道場必散矣豈不危哉龔爾茂以廣施勸善文神降顯靈龔璋字爾茂杭州籍生長燕京性好善因曝書籍撿得梓潼帝君勸行陰隲文讀而喜極即發廣願刊板流布為史部當該因竭力印施遍行諸省不下數十萬紙又轉展勸化不數年計至二百餘萬康熙元年於廳前印文處晝見帝君綠袍玉帶降在堂中因𦘕像供奉合京感動凡有禳災療疾祈嗣保壽皆至其家許願印文一經爾茂禱告無不立應乃至盲人復明顛人頓愈神像點首枯樹重榮種種異事罷翁曰庚戌二月龔公以丁艱回武林宿靈隱親為余述兼惠梓潼報應錄備載靈異踈山大殿天王兩顯靈異撫州踈山白雲寺為匡仁祖師道場大殿上有多種靈異萬曆間一僧中夜在殿門外經行香燈久暗忽地大光僧驀推開殿門見泥塑散脂天王像立在傍剔燈後以天明其僧指出是此位又一孝廉在殿避暑帳帷天王前裸形偃臥夢一神桉劍呵曰汝褻慢至此不念是文星當一劍斬汝天曉睜眼視之恰臥在杖劍四天王前孝廉蹜頸流汗懺謝改行罷翁曰余乙未曾一宿疎山隔十年乙巳以緇白固請說法開建禪堂知寺中異事甚眾青龍山傍栽松為祖師手蹟龍王鑿石成三大井半幅袈裟遍覆五峰成白雲故額白雲寺永樂中賜內帑建殿大盜來劫見四圍皆棘門內列天兵天明來探空豁無影乃歸心道本禪師并捨賊船助建大殿今擁壁皆船板坐蓮葉看經者即賊像其遺迹也李銓部以造像獲嗣始終守節銓部李白春號瑤圃丙辰進士素不近僧後三子皆夭父敬泉就公第延華山三昧老人齋公從屏後一望驚曰此十五年前見夢者也遂出敘欵洽齋次問曰師能代某祈嗣否昧老人答曰公家福力大必作奇特大福方有感應公固請作何事師曰華山大殿方造文殊普賢二大香像約費二千金公能成就保得子矣公諾既施出一千四百金師先為起一法名曰定智文殊像方就即生一子乳名智郎即今邠肇也罷翁曰公自滄桑後即杜門教子不面官府堅持一節年近九十忽見空中旌幢羽葆儀從來迎遂冠帶怡然脫化嘗語顯曰吾經亂破家地窖所藏搜掘殆盡止有華山所修薄善是他門挐不去底又曰與其昔年有家無子毋寧今日有子而無家此皆公見到而自得受用處也李伯馨心念殺人却為心鬼所殺李夢桂字伯馨即銓部瑤圃公長君也有門下客號朱三鬍子與僕輩通謀行事伯公極恨之欲置之死一日以一名刺命僕送縣囑收朱三付獄僕匿刺偽報云已付獄又一日以名刺囑討朱三氣絕僕復偽報朱三已斃于獄未幾伯公病日見朱三鬍子來索命家人以先共朧不敢言朱三尚在日為禱神祭鬼伯公眼中所見卒不能解竟被朱三捉死罷翁曰佛經言一切唯心造又言三界唯心萬法惟識所以成佛成聖皆由自心縱墮三途亦由自心朱三儼然尚在伯公所見復何物耶曰朱三雖生于家人之手而已死于伯公之心外冤可解心冤不可解外鬼可送心鬼不可送伯公以自心之朱三作自己之冤對竟至自傷己命非一切唯心造而何哉卒之伯公已歸泉下而所謂活朱三者方高冠大袖搖擺街衢不令人千古絕倒耶祖師曰莫教心病最難醫所以儒者慎幽獨禪門絕滲漏為修行第一要著也久病翁喜還夙債頓去心蛇明太倉一周孝廉以家貧不能上公車鄰翁頗富以百金貸之後孝廉成進士授京官多年不還鄉鄰翁罹橫禍家道耗盡因成病久臥牀褥思念貸金心銜恚恨病久不能舉火恨益篤後周公回里忽憶前事問家人隣翁在否家人具言貧病狀公蹙額曰是吾過也立以原銀外贈百金賚至牀前病人一見喜極咯然吐出一蛇病頓霍罷翁曰余至友惠大師從吳門歸崑泊舟真義時秋水澄徹見河底一小蝦麻蟲作水漚泛起至水面一𪹼即成蜻蜓連𪹼數箇次見一蟲泛起師戲以青蘆一頂而下墜又努力泛起復一頂而墜連頂三次後此蟲竟不泛起乃橫𭺗上岸𪹼出便成蜈蚣一念心毒形骸立變真絕異事楞伽云眾生心識有不思議薰則有不思議變隣翁以恨久而成蛇水蟲以毒極而立變皆心識中不思議事所謂性具也惡既如此善亦復然華嚴曰初發心時便成正覺不於此可廓然大悟乎馬給諫以禍虧齋素竟歸神道平湖給諫馬嘉植字培原甲戌進士操行清正內外淳潔奉差任外時因某衙門解欠糧陳明甫二吏至囑朴死馬公從之九日掃墓忽見二鬼陳冤馬公曰此某臺意非我也鬼曰此罪我二人偶為替身原非本犯若老爺賜一駁問我即辨明以雷霆之下不容置辨故負冤而死今我二人雖不敢索命老爺不久亦當謝世為蒲圻城隍矣馬公聞言太惡之遂持齋戒禮雪竇石奇老人披削法名行且號僧祥清淨修持已十二年時寄靜東湖化城菴與主人慈岸師友善忽一日以小恙食鷄子夜分復見二吏現前告曰老爺以破齋素勢不能留某日當赴蒲圻矣馬公悔恨至期目見候吏而逝罷翁曰馬培老沒為明神似非墮落然其素志在乎出世故聞信苦修何期齋戒不終復歸神道信乎修行當矢志鐵石斷不可行百里而半五十也
